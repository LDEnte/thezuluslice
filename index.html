<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Zulu Slice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Lato:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
    }

    body {
      background: #0C0804;
      color: #F2E8D2;
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    .wrap {
      max-width: 480px;
      width: 100%;
    }

    .title {
      font-family: 'Cinzel', serif;
      font-weight: 900;
      font-size: clamp(2.5rem, 10vw, 4.5rem);
      letter-spacing: 0.08em;
      line-height: 1;
      color: #F2E8D2;
      margin-bottom: 0.2rem;
    }

    .subtitle {
      font-family: 'Cinzel', serif;
      font-size: clamp(0.65rem, 2vw, 0.8rem);
      letter-spacing: 0.5em;
      text-transform: uppercase;
      color: #C8922A;
      margin-bottom: 2.5rem;
    }

    .beads {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      margin-bottom: 2.5rem;
    }

    .bead { width: 10px; height: 10px; border-radius: 50%; }

    .coming {
      font-family: 'Cinzel', serif;
      font-size: clamp(0.6rem, 1.8vw, 0.72rem);
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: rgba(242,232,210,0.45);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1 class="title">THE ZULU SLICE</h1>
    <p class="subtitle">Golf Tour &nbsp;·&nbsp; Drakensberg</p>

    <div class="beads">
      <div class="bead" style="background:#E03030"></div>
      <div class="bead" style="background:#C8922A"></div>
      <div class="bead" style="background:#F2E8D2"></div>
      <div class="bead" style="background:#30A050"></div>
      <div class="bead" style="background:#3070E0"></div>
      <div class="bead" style="background:#E03030"></div>
      <div class="bead" style="background:#C8922A"></div>
      <div class="bead" style="background:#F2E8D2"></div>
      <div class="bead" style="background:#30A050"></div>
      <div class="bead" style="background:#3070E0"></div>
      <div class="bead" style="background:#E03030"></div>
    </div>

    <p class="coming">Coming Soon</p>
  </div>
</body>
</html>
